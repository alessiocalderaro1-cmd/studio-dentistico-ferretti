<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56" role="img" aria-label="Studio Ferretti">
  <defs>
    <linearGradient id="lg-arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a8ff"/>
      <stop offset="100%" stop-color="#7feff6"/>
    </linearGradient>
  </defs>
  <!-- Logomark: arcata dentale stilizzata -->
  <g transform="translate(0, 8)">
    <!-- 6 archetti che simulano denti, dal piccolo al grande verso il centro -->
    <path d="M 4 28 Q 6 14 10 14 Q 14 14 16 28" fill="none" stroke="#261d26" stroke-width="2" stroke-linecap="round"/>
    <path d="M 16 30 Q 18 12 22 12 Q 26 12 28 30" fill="none" stroke="#261d26" stroke-width="2" stroke-linecap="round"/>
    <path d="M 28 32 Q 30 8 34 8 Q 38 8 40 32" fill="none" stroke="url(#lg-arc)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- punto centrale, signature element del sito (V3 weight-coded dot) -->
    <circle cx="34" cy="44" r="3" fill="#c8a8ff"/>
  </g>
  <!-- Lettering: weight-coded come da design system V3 -->
  <text x="56" y="28" font-family="'Manrope', sans-serif" font-weight="200" font-size="22" letter-spacing="-0.04em" fill="#261d26">studio</text>
  <text x="120" y="28" font-family="'Manrope', sans-serif" font-weight="800" font-size="22" letter-spacing="-0.04em" fill="#261d26">Ferretti</text>
  <!-- Sub-line tipografica -->
  <text x="56" y="46" font-family="'Manrope', sans-serif" font-weight="500" font-size="9" letter-spacing="0.3em" fill="#5a4f5a">DENTISTI · BRESCIA</text>
</svg>
