<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4096 2048" width="4096" height="2048" preserveAspectRatio="none">
  <defs>
    <linearGradient id="wait-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8de"/>
      <stop offset="100%" stop-color="#dccfb8"/>
    </linearGradient>
    <linearGradient id="wait-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9c8e7a"/>
      <stop offset="100%" stop-color="#6a5e4f"/>
    </linearGradient>
    <linearGradient id="wait-ceiling" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e8e4dc"/>
    </linearGradient>
    <radialGradient id="warm-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff2c0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soffitto -->
  <rect x="0" y="0" width="4096" height="780" fill="url(#wait-ceiling)"/>
  <!-- Pareti -->
  <rect x="0" y="780" width="4096" height="420" fill="url(#wait-wall)"/>
  <!-- Pavimento parquet -->
  <rect x="0" y="1200" width="4096" height="848" fill="url(#wait-floor)"/>

  <!-- Listoni parquet (linee verticali) -->
  <g opacity="0.4" stroke="#4a3f33" stroke-width="2">
    <line x1="200" y1="1200" x2="180" y2="2048"/>
    <line x1="600" y1="1200" x2="580" y2="2048"/>
    <line x1="1000" y1="1200" x2="980" y2="2048"/>
    <line x1="1400" y1="1200" x2="1380" y2="2048"/>
    <line x1="1800" y1="1200" x2="1780" y2="2048"/>
    <line x1="2200" y1="1200" x2="2200" y2="2048"/>
    <line x1="2600" y1="1200" x2="2620" y2="2048"/>
    <line x1="3000" y1="1200" x2="3020" y2="2048"/>
    <line x1="3400" y1="1200" x2="3420" y2="2048"/>
    <line x1="3800" y1="1200" x2="3820" y2="2048"/>
  </g>

  <!-- Plafoniere a soffitto -->
  <g opacity="0.6">
    <circle cx="600" cy="180" r="80" fill="#fff8d4"/>
    <circle cx="1500" cy="180" r="80" fill="#fff8d4"/>
    <circle cx="2400" cy="180" r="80" fill="#fff8d4"/>
    <circle cx="3300" cy="180" r="80" fill="#fff8d4"/>
  </g>

  <!-- Quadri / opere alla parete -->
  <rect x="500" y="850" width="280" height="200" fill="#fafafa" stroke="#6a5e4f" stroke-width="3"/>
  <rect x="540" y="890" width="200" height="120" fill="#a3d9c8"/>
  <rect x="900" y="850" width="280" height="200" fill="#fafafa" stroke="#6a5e4f" stroke-width="3"/>
  <rect x="940" y="890" width="200" height="120" fill="#d97548"/>

  <!-- Scaffale con riviste/libri (parete sinistra) -->
  <rect x="200" y="950" width="240" height="250" fill="#5a4a36"/>
  <line x1="200" y1="1010" x2="440" y2="1010" stroke="#3a3024" stroke-width="2"/>
  <line x1="200" y1="1080" x2="440" y2="1080" stroke="#3a3024" stroke-width="2"/>
  <line x1="200" y1="1150" x2="440" y2="1150" stroke="#3a3024" stroke-width="2"/>

  <!-- Divano lungo al centro -->
  <ellipse cx="2048" cy="1500" rx="1100" ry="80" fill="#fff2c0" opacity="0.35"/>
  <rect x="1300" y="1280" width="1500" height="240" rx="20" fill="#3a4750"/>
  <rect x="1320" y="1300" width="1460" height="100" rx="12" fill="#5e7280"/>
  <rect x="1300" y="1380" width="1500" height="140" rx="20" fill="#465662"/>
  <!-- Cuscini -->
  <rect x="1380" y="1300" width="180" height="80" rx="10" fill="#a3d9c8"/>
  <rect x="1620" y="1300" width="180" height="80" rx="10" fill="#d97548"/>
  <rect x="2280" y="1300" width="180" height="80" rx="10" fill="#a3d9c8"/>
  <rect x="2520" y="1300" width="180" height="80" rx="10" fill="#d97548"/>

  <!-- Tavolino centrale con riviste -->
  <rect x="1750" y="1620" width="600" height="120" rx="8" fill="#5a4a36"/>
  <rect x="1850" y="1620" width="200" height="80" rx="4" fill="#dbe7ed" stroke="#5e6469" stroke-width="2"/>
  <rect x="2080" y="1630" width="180" height="70" rx="4" fill="#fafafa" stroke="#5e6469" stroke-width="2"/>

  <!-- Pianta in vaso (angolo destro) -->
  <g transform="translate(3500, 1100)">
    <rect x="-50" y="0" width="100" height="120" fill="#3a3024"/>
    <path d="M 0 0 Q -80 -100 -100 -200 M 0 0 Q -30 -120 -20 -220 M 0 0 Q 30 -120 20 -220 M 0 0 Q 80 -100 100 -200" stroke="#4a7a4d" stroke-width="6" fill="none"/>
    <ellipse cx="0" cy="-160" rx="120" ry="60" fill="#5a8a5d" opacity="0.5"/>
  </g>

  <!-- Pianta angolo sinistro -->
  <g transform="translate(700, 1100)">
    <rect x="-40" y="0" width="80" height="100" fill="#3a3024"/>
    <path d="M 0 0 Q -60 -80 -80 -150 M 0 0 Q 0 -100 0 -180 M 0 0 Q 60 -80 80 -150" stroke="#4a7a4d" stroke-width="5" fill="none"/>
  </g>

  <!-- Macchinetta caffè/water dispenser -->
  <rect x="3200" y="1000" width="120" height="200" fill="#3a4750"/>
  <rect x="3210" y="1010" width="100" height="60" fill="#5591B7"/>
  <rect x="3210" y="1080" width="100" height="80" fill="#1a2530"/>

  <!-- Riflessi sul pavimento parquet -->
  <ellipse cx="2048" cy="1820" rx="1300" ry="40" fill="#fff2c0" opacity="0.15"/>

  <!-- Etichetta ambiente -->
  <g transform="translate(2048, 200)" text-anchor="middle">
    <rect x="-280" y="-50" width="560" height="80" rx="40" fill="rgba(217, 117, 72, 0.85)"/>
    <text x="0" y="3" font-family="system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="0.2em" fill="#fff">SALA D'ATTESA</text>
  </g>
</svg>
