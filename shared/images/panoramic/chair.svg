<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4096 2048" preserveAspectRatio="none">
  <defs>
    <linearGradient id="ch-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fa"/>
      <stop offset="100%" stop-color="#dbe7ed"/>
    </linearGradient>
    <linearGradient id="ch-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bcc5cc"/>
      <stop offset="100%" stop-color="#7a8590"/>
    </linearGradient>
    <linearGradient id="ch-ceiling" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcfdfe"/>
      <stop offset="100%" stop-color="#e0eaf0"/>
    </linearGradient>
    <radialGradient id="surgical-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffaf0" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#fffaf0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fffaf0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soffitto -->
  <rect x="0" y="0" width="4096" height="780" fill="url(#ch-ceiling)"/>
  <!-- Pareti -->
  <rect x="0" y="780" width="4096" height="420" fill="url(#ch-wall)"/>
  <!-- Pavimento (linoleum chiaro) -->
  <rect x="0" y="1200" width="4096" height="848" fill="url(#ch-floor)"/>

  <!-- Plafoniere LED a soffitto -->
  <g opacity="0.7">
    <rect x="400" y="100" width="600" height="50" rx="4" fill="#fff8e8"/>
    <rect x="1200" y="100" width="600" height="50" rx="4" fill="#fff8e8"/>
    <rect x="2000" y="100" width="600" height="50" rx="4" fill="#fff8e8"/>
    <rect x="2800" y="100" width="600" height="50" rx="4" fill="#fff8e8"/>
  </g>

  <!-- Vetrina strumenti (parete sinistra) -->
  <rect x="200" y="780" width="500" height="420" fill="#fafafa" stroke="#5e6469" stroke-width="3"/>
  <line x1="200" y1="900" x2="700" y2="900" stroke="#5e6469" stroke-width="2"/>
  <line x1="200" y1="1020" x2="700" y2="1020" stroke="#5e6469" stroke-width="2"/>
  <line x1="200" y1="1140" x2="700" y2="1140" stroke="#5e6469" stroke-width="2"/>
  <!-- Strumenti dentro vetrina -->
  <g opacity="0.5">
    <rect x="240" y="820" width="100" height="60" fill="#a3d9c8"/>
    <rect x="380" y="820" width="100" height="60" fill="#5591B7"/>
    <rect x="520" y="820" width="100" height="60" fill="#fff8d4"/>
    <rect x="240" y="940" width="60" height="60" fill="#5591B7" rx="30"/>
    <rect x="340" y="940" width="60" height="60" fill="#a3d9c8" rx="30"/>
    <rect x="440" y="940" width="60" height="60" fill="#d97548" rx="30"/>
  </g>

  <!-- Riunito odontoiatrico CENTRALE -->
  <g transform="translate(2048, 1300)">
    <!-- Base circolare -->
    <ellipse cx="0" cy="280" rx="650" ry="60" fill="#fff8d4" opacity="0.4"/>
    <ellipse cx="0" cy="260" rx="280" ry="40" fill="#3a4750"/>
    <!-- Colonna base -->
    <rect x="-80" y="-100" width="160" height="360" rx="8" fill="#5e7280"/>
    <!-- Schienale poltrona -->
    <ellipse cx="0" cy="-200" rx="180" ry="60" fill="#7a8590"/>
    <rect x="-180" y="-260" width="360" height="240" rx="80" fill="#dbe7ed"/>
    <rect x="-160" y="-240" width="320" height="200" rx="60" fill="#5591B7"/>
    <!-- Sedile poltrona -->
    <rect x="-200" y="-40" width="400" height="60" rx="20" fill="#5591B7"/>
    <!-- Bracciolo -->
    <rect x="-220" y="-20" width="60" height="120" rx="10" fill="#3a4750"/>
    <rect x="160" y="-20" width="60" height="120" rx="10" fill="#3a4750"/>
    <!-- Poggiapiedi -->
    <rect x="-160" y="100" width="320" height="40" rx="10" fill="#5591B7"/>
    <rect x="-140" y="140" width="280" height="120" rx="10" fill="#7a8590"/>
  </g>

  <!-- Lampada scialitica (sospesa al soffitto sopra il riunito) -->
  <g transform="translate(2048, 800)">
    <line x1="0" y1="-700" x2="0" y2="0" stroke="#5e6469" stroke-width="6"/>
    <line x1="0" y1="-300" x2="-150" y2="-100" stroke="#5e6469" stroke-width="8"/>
    <line x1="-150" y1="-100" x2="0" y2="50" stroke="#5e6469" stroke-width="8"/>
    <ellipse cx="0" cy="50" rx="180" ry="80" fill="#fffaf0"/>
    <ellipse cx="0" cy="50" rx="160" ry="60" fill="#fff8d4"/>
    <ellipse cx="0" cy="100" rx="200" ry="40" fill="url(#surgical-light)"/>
  </g>

  <!-- Cono di luce sul riunito -->
  <ellipse cx="2048" cy="1400" rx="800" ry="200" fill="url(#surgical-light)" opacity="0.6"/>

  <!-- Carrello strumenti laterale -->
  <g transform="translate(2700, 1400)">
    <rect x="0" y="0" width="200" height="240" rx="6" fill="#cdd5db"/>
    <rect x="20" y="20" width="160" height="60" fill="#fafafa"/>
    <rect x="20" y="100" width="160" height="40" fill="#5591B7"/>
    <rect x="20" y="160" width="160" height="60" fill="#fafafa"/>
    <!-- Ruote -->
    <circle cx="30" cy="240" r="10" fill="#3a4750"/>
    <circle cx="170" cy="240" r="10" fill="#3a4750"/>
  </g>

  <!-- Postazione assistente (sgabello) -->
  <g transform="translate(1200, 1500)">
    <rect x="0" y="40" width="100" height="20" rx="10" fill="#3a4750"/>
    <line x1="50" y1="60" x2="50" y2="160" stroke="#3a4750" stroke-width="6"/>
    <ellipse cx="50" cy="160" rx="30" ry="6" fill="#5e6469"/>
  </g>

  <!-- Monitor radiografie a parete (destro) -->
  <rect x="3200" y="800" width="600" height="380" rx="8" fill="#0a0a0a" stroke="#5e6469" stroke-width="4"/>
  <rect x="3220" y="820" width="560" height="340" fill="#1a1a2e"/>
  <!-- Radiografia simulata -->
  <g opacity="0.7">
    <rect x="3260" y="860" width="240" height="280" fill="#dbe7ed"/>
    <ellipse cx="3380" cy="950" rx="80" ry="40" fill="#fafafa"/>
    <ellipse cx="3380" cy="1020" rx="60" ry="30" fill="#fafafa"/>
  </g>
  <text x="3500" y="900" font-family="monospace" font-size="20" fill="#5591B7">PATIENT 2026-04-27</text>
  <text x="3500" y="940" font-family="monospace" font-size="16" fill="#a3d9c8">SCAN OK</text>

  <!-- Lavandino chirurgico (parete dx) -->
  <rect x="3850" y="900" width="180" height="200" rx="6" fill="#dbe7ed"/>
  <ellipse cx="3940" cy="980" rx="60" ry="20" fill="#5e7280"/>
  <line x1="3940" y1="950" x2="3940" y2="900" stroke="#a8b3bd" stroke-width="6"/>

  <!-- Etichetta ambiente -->
  <g transform="translate(2048, 200)" text-anchor="middle">
    <rect x="-330" y="-50" width="660" height="80" rx="40" fill="rgba(85, 145, 183, 0.9)"/>
    <text x="0" y="3" font-family="system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="0.2em" fill="#fff">RIUNITO ODONTOIATRICO</text>
  </g>
</svg>
