<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4096 2048" preserveAspectRatio="none">
  <defs>
    <linearGradient id="surg-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafcfd"/>
      <stop offset="100%" stop-color="#dde6ed"/>
    </linearGradient>
    <linearGradient id="surg-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a3aeb6"/>
      <stop offset="100%" stop-color="#5e6a72"/>
    </linearGradient>
    <linearGradient id="surg-ceiling" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3ebf2"/>
    </linearGradient>
    <radialGradient id="bright-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soffitto -->
  <rect x="0" y="0" width="4096" height="780" fill="url(#surg-ceiling)"/>
  <!-- Pareti -->
  <rect x="0" y="780" width="4096" height="420" fill="url(#surg-wall)"/>
  <!-- Pavimento (linoleum classe B sterile) -->
  <rect x="0" y="1200" width="4096" height="848" fill="url(#surg-floor)"/>

  <!-- Pannelli LED estesi al soffitto -->
  <g opacity="0.85">
    <rect x="0" y="80" width="4096" height="60" fill="#ffffff"/>
    <rect x="0" y="160" width="4096" height="20" fill="#dbe7ed"/>
    <rect x="100" y="240" width="3896" height="40" fill="#fffaf0" opacity="0.6"/>
  </g>

  <!-- Armadio strumenti chirurgici (parete sinistra) -->
  <rect x="100" y="800" width="700" height="400" fill="#fafafa" stroke="#5e6469" stroke-width="3"/>
  <line x1="100" y1="900" x2="800" y2="900" stroke="#5e6469" stroke-width="2"/>
  <line x1="100" y1="1000" x2="800" y2="1000" stroke="#5e6469" stroke-width="2"/>
  <line x1="100" y1="1100" x2="800" y2="1100" stroke="#5e6469" stroke-width="2"/>
  <line x1="450" y1="800" x2="450" y2="1200" stroke="#5e6469" stroke-width="2"/>
  <!-- Maniglie cassetti -->
  <g fill="#5591B7">
    <rect x="200" y="848" width="80" height="6" rx="3"/>
    <rect x="550" y="848" width="80" height="6" rx="3"/>
    <rect x="200" y="948" width="80" height="6" rx="3"/>
    <rect x="550" y="948" width="80" height="6" rx="3"/>
    <rect x="200" y="1048" width="80" height="6" rx="3"/>
    <rect x="550" y="1048" width="80" height="6" rx="3"/>
    <rect x="200" y="1148" width="80" height="6" rx="3"/>
    <rect x="550" y="1148" width="80" height="6" rx="3"/>
  </g>

  <!-- Lettino chirurgico CENTRALE -->
  <g transform="translate(2048, 1300)">
    <!-- Ombra sul pavimento -->
    <ellipse cx="0" cy="380" rx="700" ry="60" fill="#000" opacity="0.15"/>
    <!-- Base -->
    <rect x="-380" y="200" width="760" height="100" rx="10" fill="#3a4750"/>
    <rect x="-340" y="200" width="680" height="20" fill="#5e7280"/>
    <!-- Colonna centrale -->
    <rect x="-50" y="100" width="100" height="120" rx="6" fill="#5e7280"/>
    <!-- Piano lettino -->
    <rect x="-380" y="80" width="760" height="60" rx="20" fill="#fafafa" stroke="#5e6469" stroke-width="2"/>
    <!-- Cuscino testa -->
    <rect x="-380" y="40" width="220" height="80" rx="40" fill="#fafafa" stroke="#5e6469" stroke-width="2"/>
    <!-- Lenzuolo verde sterile -->
    <rect x="-340" y="80" width="680" height="60" fill="#a3d9c8" opacity="0.7"/>
    <!-- Bracciolo monitor vitali -->
    <rect x="380" y="60" width="40" height="180" rx="6" fill="#3a4750"/>
    <rect x="420" y="20" width="160" height="120" fill="#0a0a0a" stroke="#5591B7" stroke-width="3"/>
    <!-- Monitor display -->
    <line x1="430" y1="80" x2="570" y2="80" stroke="#5DCFB8" stroke-width="2"/>
    <path d="M 430 80 L 460 60 L 470 100 L 490 70 L 510 90 L 530 50 L 550 80 L 570 80" stroke="#5DCFB8" stroke-width="2" fill="none"/>
    <text x="430" y="125" font-family="monospace" font-size="14" fill="#5591B7">SpO2 98%</text>
  </g>

  <!-- Lampada scialitica DOPPIA (sopra lettino) -->
  <g transform="translate(2048, 800)">
    <!-- Braccio articolato -->
    <line x1="0" y1="-780" x2="0" y2="-200" stroke="#5e6469" stroke-width="10"/>
    <circle cx="0" cy="-200" r="20" fill="#5e6469"/>
    <line x1="0" y1="-200" x2="-220" y2="-50" stroke="#5e6469" stroke-width="10"/>
    <line x1="0" y1="-200" x2="220" y2="-50" stroke="#5e6469" stroke-width="10"/>
    <!-- Cupole lampade -->
    <ellipse cx="-220" cy="-30" rx="180" ry="80" fill="#fafafa" stroke="#5e6469" stroke-width="4"/>
    <ellipse cx="-220" cy="-30" rx="160" ry="60" fill="#fff8e8"/>
    <ellipse cx="220" cy="-30" rx="180" ry="80" fill="#fafafa" stroke="#5e6469" stroke-width="4"/>
    <ellipse cx="220" cy="-30" rx="160" ry="60" fill="#fff8e8"/>
    <!-- LED concentrici -->
    <g fill="#fff" opacity="0.9">
      <circle cx="-260" cy="-30" r="6"/>
      <circle cx="-220" cy="-30" r="6"/>
      <circle cx="-180" cy="-30" r="6"/>
      <circle cx="180" cy="-30" r="6"/>
      <circle cx="220" cy="-30" r="6"/>
      <circle cx="260" cy="-30" r="6"/>
    </g>
  </g>

  <!-- Cono di luce sul lettino -->
  <ellipse cx="2048" cy="1380" rx="900" ry="180" fill="url(#bright-light)" opacity="0.7"/>

  <!-- Tavolo chirurgico Mayo (carrello strumenti sterilizzati) -->
  <g transform="translate(1300, 1450)">
    <rect x="0" y="0" width="280" height="20" rx="4" fill="#fafafa"/>
    <line x1="140" y1="20" x2="140" y2="180" stroke="#5e6469" stroke-width="6"/>
    <ellipse cx="140" cy="180" rx="60" ry="10" fill="#3a4750"/>
    <!-- Strumenti chirurgici sul vassoio -->
    <g opacity="0.6">
      <rect x="20" y="2" width="40" height="6" rx="2" fill="#cdd5db"/>
      <rect x="80" y="2" width="40" height="6" rx="2" fill="#cdd5db"/>
      <rect x="140" y="2" width="40" height="6" rx="2" fill="#cdd5db"/>
      <rect x="200" y="2" width="40" height="6" rx="2" fill="#cdd5db"/>
    </g>
  </g>

  <!-- Anestesista / aspiratore chirurgico (destra) -->
  <g transform="translate(2700, 1400)">
    <rect x="0" y="0" width="240" height="280" rx="8" fill="#dbe7ed" stroke="#5e6469" stroke-width="3"/>
    <rect x="20" y="20" width="200" height="100" fill="#0a0a0a"/>
    <rect x="40" y="40" width="160" height="60" fill="#5DCFB8" opacity="0.4"/>
    <text x="50" y="65" font-family="monospace" font-size="14" fill="#5DCFB8">VITAL MONITOR</text>
    <rect x="20" y="140" width="200" height="120" fill="#5e7280"/>
    <circle cx="60" cy="190" r="20" fill="#3a4750"/>
    <circle cx="120" cy="190" r="20" fill="#3a4750"/>
    <circle cx="180" cy="190" r="20" fill="#5591B7"/>
  </g>

  <!-- Autoclave (parete destra) -->
  <rect x="3300" y="850" width="500" height="350" fill="#dbe7ed" stroke="#5e6469" stroke-width="3"/>
  <rect x="3320" y="870" width="460" height="120" fill="#0a0a0a"/>
  <text x="3340" y="930" font-family="monospace" font-size="20" fill="#a3d9c8">CICLO B</text>
  <text x="3340" y="960" font-family="monospace" font-size="16" fill="#5DCFB8">EN 13060 · 134°C</text>
  <text x="3340" y="980" font-family="monospace" font-size="16" fill="#5591B7">STERILIZED</text>
  <circle cx="3550" cy="1100" r="60" fill="#5e7280" stroke="#3a4750" stroke-width="4"/>
  <circle cx="3550" cy="1100" r="35" fill="#fafafa"/>
  <text x="3550" y="1108" font-family="monospace" font-size="14" font-weight="bold" fill="#5e6469" text-anchor="middle">B</text>

  <!-- Riflessi pavimento -->
  <ellipse cx="2048" cy="1880" rx="1500" ry="60" fill="#ffffff" opacity="0.2"/>

  <!-- Etichetta ambiente -->
  <g transform="translate(2048, 200)" text-anchor="middle">
    <rect x="-280" y="-50" width="560" height="80" rx="40" fill="rgba(217, 117, 72, 0.9)"/>
    <text x="0" y="3" font-family="system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="0.2em" fill="#fff">SALA CHIRURGICA</text>
  </g>
</svg>
