<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <radialGradient id="ba4a-bg" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#fde9dc"/>
      <stop offset="100%" stop-color="#bf8d76"/>
    </radialGradient>
    <linearGradient id="ba4a-lip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b86862"/>
      <stop offset="100%" stop-color="#893f3a"/>
    </linearGradient>
    <radialGradient id="ba4a-mouth" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#3a1818"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </radialGradient>
    <linearGradient id="ba4a-gum" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d27066"/>
      <stop offset="100%" stop-color="#9a463e"/>
    </linearGradient>
    <linearGradient id="ba4a-bright" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#fbf8f0"/>
      <stop offset="100%" stop-color="#e8dcc4"/>
    </linearGradient>
    <radialGradient id="ba4a-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a8ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c8a8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#ba4a-bg)"/>
  <ellipse cx="600" cy="450" rx="500" ry="280" fill="url(#ba4a-lip)"/>
  <ellipse cx="600" cy="450" rx="460" ry="250" fill="url(#ba4a-mouth)"/>

  <!-- Glow lavender attorno alla bocca (signature V3 sbiancamento "tech") -->
  <ellipse cx="600" cy="450" rx="500" ry="220" fill="url(#ba4a-glow)"/>

  <path d="M 200 320 Q 600 240 1000 320 L 1000 380 Q 600 320 200 380 Z" fill="url(#ba4a-gum)"/>
  <path d="M 200 580 Q 600 660 1000 580 L 1000 540 Q 600 600 200 540 Z" fill="url(#ba4a-gum)"/>

  <!-- Denti superiori BIANCHISSIMI -->
  <g id="ba4a-bright-teeth">
    <ellipse cx="305" cy="430" rx="32" ry="55" fill="url(#ba4a-bright)"/>
    <ellipse cx="380" cy="425" rx="34" ry="60" fill="url(#ba4a-bright)"/>
    <ellipse cx="455" cy="420" rx="36" ry="62" fill="url(#ba4a-bright)"/>
    <ellipse cx="535" cy="418" rx="38" ry="65" fill="url(#ba4a-bright)"/>
    <ellipse cx="618" cy="416" rx="40" ry="68" fill="url(#ba4a-bright)"/>
    <ellipse cx="700" cy="418" rx="38" ry="65" fill="url(#ba4a-bright)"/>
    <ellipse cx="780" cy="420" rx="36" ry="62" fill="url(#ba4a-bright)"/>
    <ellipse cx="855" cy="425" rx="34" ry="60" fill="url(#ba4a-bright)"/>
    <ellipse cx="925" cy="430" rx="32" ry="55" fill="url(#ba4a-bright)"/>
  </g>

  <!-- Denti inferiori bianchi -->
