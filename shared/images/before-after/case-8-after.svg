  <!-- Stelle sparkle (tech-tone signature V3) -->
  <g fill="#7feff6">
    <path d="M 350 360 L 358 376 L 374 384 L 358 392 L 350 408 L 342 392 L 326 384 L 342 376 Z"/>
    <path d="M 870 350 L 876 362 L 888 368 L 876 374 L 870 386 L 864 374 L 852 368 L 864 362 Z"/>
    <path d="M 600 320 L 605 330 L 615 335 L 605 340 L 600 350 L 595 340 L 585 335 L 595 330 Z"/>
  </g>

  <!-- Etichetta scala VITA post -->
  <g transform="translate(900, 760)">
    <rect x="-220" y="-30" width="220" height="50" rx="8" fill="rgba(200, 168, 255, 0.9)"/>
    <text x="-200" y="3" font-family="'SF Mono', monospace" font-size="14" font-weight="600" fill="#261d26">SCALA VITA</text>
    <text x="-100" y="3" font-family="'SF Mono', monospace" font-size="14" font-weight="700" fill="#261d26">B1 (-5 toni)</text>
  </g>

  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="180" height="48" rx="24" fill="rgba(200, 168, 255, 0.9)"/>
    <text x="90" y="32" font-family="'Manrope', sans-serif" font-weight="700" font-size="18" letter-spacing="0.2em" text-anchor="middle" fill="#261d26">DOPO</text>
  </g>
  <text x="60" y="850" font-family="'Manrope', sans-serif" font-weight="500" font-size="20" fill="#fff" opacity="0.9">Mantenimento parodontale · 5 anni · denti naturali preservati</text>
