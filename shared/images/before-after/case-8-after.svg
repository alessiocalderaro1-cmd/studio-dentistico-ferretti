    <ellipse cx="386" cy="528" rx="30" ry="50" fill="url(#ba4a-bright)"/>
    <ellipse cx="452" cy="530" rx="30" ry="52" fill="url(#ba4a-bright)"/>
    <ellipse cx="518" cy="530" rx="32" ry="54" fill="url(#ba4a-bright)"/>
    <ellipse cx="585" cy="530" rx="32" ry="55" fill="url(#ba4a-bright)"/>
    <ellipse cx="652" cy="530" rx="32" ry="54" fill="url(#ba4a-bright)"/>
    <ellipse cx="718" cy="530" rx="30" ry="52" fill="url(#ba4a-bright)"/>
    <ellipse cx="784" cy="528" rx="30" ry="50" fill="url(#ba4a-bright)"/>
    <ellipse cx="850" cy="525" rx="28" ry="48" fill="url(#ba4a-bright)"/>
  </g>

  <!-- Highlight INTENSI (denti lucidissimi post-sbiancamento) -->
  <g opacity="0.85" fill="#ffffff">
    <ellipse cx="305" cy="408" rx="11" ry="26"/>
    <ellipse cx="380" cy="402" rx="13" ry="30"/>
    <ellipse cx="455" cy="397" rx="14" ry="32"/>
    <ellipse cx="535" cy="395" rx="15" ry="34"/>
